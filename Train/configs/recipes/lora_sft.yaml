method: lora_sft
entrypoint: sft
run_name: qwen3omni_lora_sft
env_config: ${TRAIN_ROOT}/configs/env/default.yaml
model_config: ${TRAIN_ROOT}/configs/models/qwen3_omni_30b_a3b_instruct.yaml
dataset_config: ${TRAIN_ROOT}/configs/datasets/datasets.yaml
dataset_stage: sft
output_dir: ${TRAIN_ROOT}/outputs/lora_sft/${RUN_NAME}

swift_args:
  split_dataset_ratio: 0
  load_from_cache_file: true
  num_train_epochs: 3
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  learning_rate: 1e-4
  gradient_accumulation_steps: 2
  gradient_checkpointing: true
  eval_steps: 100
  save_steps: 100
  save_total_limit: 3
  logging_steps: 5
  max_length: 4096
  truncation_strategy: delete
  warmup_ratio: 0.05
  dataset_num_proc: 8
  dataloader_num_workers: 8
  attn_impl: sdpa
  deepspeed: zero3
